name: Eval — README Quality Gate

on:
  workflow_run:
    workflows: ["Deploy and Run AI README Generator"]
    types: [completed]
  workflow_dispatch:
    inputs:
      readme_bucket_name:
        description: "S3 bucket name (override terraform output)"
        required: false
      state_machine_arn:
        description: "SFN state machine ARN (override terraform output)"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    # Only run if the triggering workflow succeeded (or if manually dispatched)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: us-west-2

      - name: Setup Terraform (for output lookup)
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set infrastructure variables
        id: infra
        working-directory: infra
        run: |
          # Prefer manual dispatch inputs; fall back to terraform output
          if [[ -n "${{ github.event.inputs.readme_bucket_name }}" ]]; then
            echo "readme_bucket_name=${{ github.event.inputs.readme_bucket_name }}" >> "$GITHUB_OUTPUT"
            echo "state_machine_arn=${{ github.event.inputs.state_machine_arn }}"   >> "$GITHUB_OUTPUT"
          else
            terraform init -input=false
            echo "readme_bucket_name=$(terraform output -raw readme_bucket_name)" >> "$GITHUB_OUTPUT"
            echo "state_machine_arn=$(terraform output -raw state_machine_arn)"   >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Trigger hello-world pipeline and wait for README
        env:
          README_BUCKET_NAME: ${{ steps.infra.outputs.readme_bucket_name }}
        run: |
          # Trigger the pipeline for octocat/Hello-World using generate.sh encoding
          ENCODED="https---github.com-octocat-Hello-World"
          # Delete stale output first
          aws s3 rm "s3://${README_BUCKET_NAME}/outputs/Hello-World/README.md" 2>/dev/null || true
          aws s3 cp /dev/null "s3://${README_BUCKET_NAME}/inputs/${ENCODED}"
          echo "Triggered Hello-World pipeline. Waiting for output (max 5 min)..."

          TIMEOUT=300
          ELAPSED=0
          until aws s3 ls "s3://${README_BUCKET_NAME}/outputs/Hello-World/README.md" 2>/dev/null; do
            if [[ $ELAPSED -ge $TIMEOUT ]]; then
              echo "ERROR: README not produced within ${TIMEOUT}s"
              exit 1
            fi
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          echo "README produced after ${ELAPSED}s"

      - name: Run smoke eval suite
        env:
          CI: "true"
          README_BUCKET_NAME: ${{ steps.infra.outputs.readme_bucket_name }}
          STATE_MACHINE_ARN: ${{ steps.infra.outputs.state_machine_arn }}
        run: |
          pytest tests/eval/ -m smoke -v \
            --tb=short \
            --junit-xml=eval-results.xml

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results.xml
          retention-days: 30
