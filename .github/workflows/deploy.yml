name: Deploy and Run AI README Generator

on:
  push:
    branches:
      - main

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: us-west-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Trigger pipeline for current repository
        # URL encoding matches generate.sh: https://github.com/owner/repo -> https---github.com-owner-repo
        run: |
          BUCKET=$(terraform output -raw readme_bucket_name)
          REPO_URL="https://github.com/${{ github.repository }}"
          ENCODED=$(echo "$REPO_URL" | sed 's|://|---|; s|/|-|g')
          aws s3 cp /dev/null "s3://${BUCKET}/inputs/${ENCODED}"
          echo "Pipeline triggered for ${REPO_URL} (key: inputs/${ENCODED})"

      - name: Export Terraform outputs
        id: tf_outputs
        run: |
          echo "readme_bucket_name=$(terraform output -raw readme_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "state_machine_arn=$(terraform output -raw state_machine_arn)"   >> "$GITHUB_OUTPUT"

    outputs:
      readme_bucket_name: ${{ steps.tf_outputs.outputs.readme_bucket_name }}
      state_machine_arn:  ${{ steps.tf_outputs.outputs.state_machine_arn }}
